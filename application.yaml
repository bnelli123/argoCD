apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: CoCo-Beach
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/bnelli123/argocd.gits
    targetRevision: HEAD
    path: charts/blue-beach
    helm:
      releaseName: CoCo-Release
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc

  syncPolicy:
    automated: {}
